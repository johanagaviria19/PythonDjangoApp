<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LibroHub | Administración{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <!-- Navbar Moderno -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-2 group">
                        <div class="bg-indigo-600 p-2 rounded-lg transition-transform group-hover:scale-110">
                            <i class="fas fa-book-open text-white"></i>
                        </div>
                        <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">LibroHub</span>
                    </a>
                    <div class="hidden sm:ml-8 sm:flex sm:space-x-8">
                        <a href="{% url 'lista_autores' %}" class="inline-flex items-center px-1 pt-1 border-b-2 {% if 'autores' in request.path %}border-indigo-500 text-slate-900{% else %}border-transparent text-slate-500 hover:border-slate-300 hover:text-slate-700{% endif %} text-sm font-medium transition-colors">
                            <i class="fas fa-user-pen mr-2"></i> Autores
                        </a>
                        <a href="{% url 'lista_libros' %}" class="inline-flex items-center px-1 pt-1 border-b-2 {% if 'libros' in request.path %}border-indigo-500 text-slate-900{% else %}border-transparent text-slate-500 hover:border-slate-300 hover:text-slate-700{% endif %} text-sm font-medium transition-colors">
                            <i class="fas fa-layer-group mr-2"></i> Libros
                        </a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/admin/" class="text-slate-500 hover:text-indigo-600 transition-colors" title="Panel Admin">
                        <i class="fas fa-cog text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="flex-grow py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            &copy; 2026 LibroHub. Diseñado para una gestión impecable.
        </div>
    </footer>
</body>
</html>
