<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Autor</title>
</head>
<body>
    <h1>Eliminar Autor</h1>
    <p>¿Estás seguro de que deseas eliminar al autor "{{ autor.nombre }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirmar Eliminación</button>
    </form>
    <br>
    <a href="{% url 'lista_autores' %}">Cancelar</a>
</body>
</html>
