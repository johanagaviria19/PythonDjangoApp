<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Autores</title>
</head>
<body>
    <h1>Lista de Autores</h1>
    <a href="{% url 'crear_autor' %}">Agregar Nuevo Autor</a> | 
    <a href="{% url 'lista_libros' %}">Ver Libros</a>
    <table border="1">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Nacionalidad</th>
                <th>Fecha Nacimiento</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for autor in autores %}
            <tr>
                <td>{{ autor.nombre }}</td>
                <td>{{ autor.correo }}</td>
                <td>{{ autor.nacionalidad }}</td>
                <td>{{ autor.fecha_nacimiento }}</td>
                <td>
                    <a href="{% url 'editar_autor' autor.pk %}">Editar</a>
                    <a href="{% url 'eliminar_autor' autor.pk %}">Eliminar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No hay autores registrados.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
